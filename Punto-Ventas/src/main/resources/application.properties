spring.application.name=Punto-de-venta

# ──────────────────────────────────────────────────
#  Abarrotes POS – Configuración principal
# ──────────────────────────────────────────────────

# Nombre de la aplicación
spring.application.name=PuntoDeVenta

# ── Base de datos SQLite ──────────────────────────
# El archivo .db se crea automáticamente junto al .exe
spring.datasource.url=jdbc:sqlite:${user.home}/PuntoDeVenta/datos.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Dialecto SQLite para Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Crea / actualiza las tablas al arrancar
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Seguridad ─────────────────────────────────────
# Desactiva el login web de Spring (usamos login JavaFX propio)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ── Configuración del negocio ─────────────────────
app.nombre-tienda=Mi Tienda
app.moneda=MXN
app.version=1.0.0